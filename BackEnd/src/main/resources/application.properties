spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.application.name=Estoque
spring.datasource.url=jdbc:mysql://localhost:3306/estoque?createDatabaseIfNotExist=true
spring.datasource.username=${DB_GENERICO_USER}
spring.datasource.password=${DB_GENERICO_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

spring.jpa.defer-datasource-initialization=true