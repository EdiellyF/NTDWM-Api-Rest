<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>react</title>
    <script>
    (function() {
      const savedTheme = localStorage.getItem('bento-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.documentElement.style.backgroundColor = savedTheme === 'dark' ? '#020617' : '#f8fafc';
    })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
